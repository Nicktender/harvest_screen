<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broadcast Control Panel</title>

<style>
    body {
        background: #111;
        color: #eee;
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
    }

    h1 {
        margin-bottom: 25px;
    }

    .panel {
        background: #1a1a1a;
        padding: 25px;
        border-radius: 12px;
    }

    label {
        display: block;
        margin-top: 18px;
        margin-bottom: 6px;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: #2b2b2b;
        color: white;
        box-sizing: border-box;
    }

    button {
        margin-top: 20px;
        padding: 14px 18px;
        border: none;
        border-radius: 8px;
        background: #4a84ff;
        color: white;
        font-size: 15px;
        cursor: pointer;
        margin-right: 10px;
    }

    button:hover {
        background: #3769d6;
    }

    .danger {
        background: #d14444;
    }

    .danger:hover {
        background: #aa2e2e;
    }

    textarea {
        width: 100%;
        height: 350px;
        margin-top: 25px;
        background: #0c0c0c;
        color: #00ff99;
        border: none;
        border-radius: 10px;
        padding: 15px;
        box-sizing: border-box;
        resize: vertical;
        font-family: monospace;
        font-size: 14px;
    }

    .info {
        margin-top: 20px;
        color: #aaa;
        font-size: 14px;
        line-height: 1.5;
    }
</style>
</head>

<body>

<h1>Broadcast Control Panel</h1>

<div class="panel">

    <label>Broadcast Title</label>
    <input type="text" id="title" placeholder="Emergency Broadcast">

    <label>Video URL</label>
    <input type="text" id="videoUrl" placeholder="https://yourcdn.com/videos/news.mp4">

    <label>Start Date & Time (YOUR LOCAL TIME)</label>
    <input type="datetime-local" id="startTime">

    <label>End Date & Time (OPTIONAL)</label>
    <input type="datetime-local" id="endTime">

    <label>If End Time Empty → Auto Duration (minutes)</label>
    <input type="number" id="durationMinutes" value="5">

    <button onclick="generateBroadcast()">
        Generate video_package.json
    </button>

    <button class="danger" onclick="stopBroadcast()">
        Generate Stop Broadcast JSON
    </button>

    <textarea id="output" readonly></textarea>

    <div class="info">
        - Times entered are converted from your local timezone into UTC automatically.<br>
        - If no end time is specified, the duration field is used.<br>
        - Copy the generated JSON into video_package.json
    </div>

</div>

<script>

function getVideoDuration(url) {
    return new Promise((resolve, reject) => {

        const video = document.createElement("video");

        video.preload = "metadata";
        video.src = url;

        video.onloadedmetadata = () => {
            window.URL.revokeObjectURL(video.src);

            if (video.duration === Infinity || isNaN(video.duration)) {
                reject("Invalid duration");
            } else {
                resolve(video.duration); // seconds
            }
        };

        video.onerror = () => {
            reject("Failed to load video metadata");
        };
    });
}

async function generateBroadcast() {

    const title =
        document.getElementById("title").value.trim();

    const videoUrl =
        document.getElementById("videoUrl").value.trim();

    const startLocal =
        document.getElementById("startTime").value;

    let endLocal =
        document.getElementById("endTime").value;

    const durationMinutesInput =
        parseInt(document.getElementById("durationMinutes").value);

    if (!videoUrl || !startLocal) {
        alert("Please provide at least a video URL and start time.");
        return;
    }

    const startDate = new Date(startLocal);
    let endDate;

    try {

        // If no end time → fetch real video duration
        if (!endLocal) {

            let durationSeconds;

            try {
                durationSeconds = await getVideoDuration(videoUrl);
            } catch (e) {
                console.warn("Could not fetch video duration, fallback to input:", e);
                durationSeconds = durationMinutesInput * 60;
            }

            endDate = new Date(startDate.getTime() + durationSeconds * 1000);

        } else {
            endDate = new Date(endLocal);
        }

        const packageData = {
            active: true,
            title: title || "Untitled Broadcast",
            video: videoUrl,

            startTime: startDate.toISOString(),
            endTime: endDate.toISOString(),

            generatedAt: new Date().toISOString()
        };

        document.getElementById("output").value =
            JSON.stringify(packageData, null, 4);

    } catch (err) {
        alert("Failed to generate broadcast: " + err);
    }
}

function stopBroadcast() {

    const packageData = {
        active: false,
        generatedAt: new Date().toISOString()
    };

    document.getElementById("output").value =
        JSON.stringify(packageData, null, 4);
}

</script>
</body>
</html>
