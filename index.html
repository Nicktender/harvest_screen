<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broadcast Control Panel</title>

<style>
    body {
        background: #111;
        color: #eee;
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
    }

    .panel {
        background: #1a1a1a;
        padding: 25px;
        border-radius: 12px;
    }

    label {
        display: block;
        margin-top: 18px;
        margin-bottom: 6px;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: #2b2b2b;
        color: white;
        box-sizing: border-box;
    }

    button {
        margin-top: 20px;
        padding: 14px 18px;
        border: none;
        border-radius: 8px;
        background: #4a84ff;
        color: white;
        font-size: 15px;
        cursor: pointer;
        margin-right: 10px;
    }

    button:hover {
        background: #3769d6;
    }

    .danger {
        background: #d14444;
    }

    textarea {
        width: 100%;
        height: 350px;
        margin-top: 25px;
        background: #0c0c0c;
        color: #00ff99;
        border: none;
        border-radius: 10px;
        padding: 15px;
        font-family: monospace;
    }

    .info {
        margin-top: 20px;
        color: #aaa;
        font-size: 13px;
        line-height: 1.5;
    }
</style>
</head>

<body>

<h1>Broadcast Control Panel</h1>

<div class="panel">

    <label>Broadcast Title</label>
    <input type="text" id="title">

    <label>Video URL</label>
    <input type="text" id="videoUrl" placeholder="https://example.com/video.mp4">

    <label>OR Upload Video File (fallback for file://)</label>
    <input type="file" id="videoFile" accept="video/*">

    <label>Start Date & Time</label>
    <input type="datetime-local" id="startTime">

    <label>End Date & Time (optional)</label>
    <input type="datetime-local" id="endTime">

    <label>Fallback Duration (minutes if detection fails)</label>
    <input type="number" id="durationMinutes" value="5">

    <button onclick="generateBroadcast()">Generate JSON</button>
    <button class="danger" onclick="stopBroadcast()">Stop Broadcast</button>

    <textarea id="output" readonly></textarea>

    <div class="info">
        ✔ Video duration is auto-detected when possible<br>
        ✔ File upload works when URL/CORS fails<br>
        ✔ Times are converted to UTC automatically
    </div>

</div>

<script>

function getVideoDuration(url) {
    return new Promise((resolve, reject) => {

        const video = document.createElement("video");
        video.preload = "metadata";
        video.src = url;

        video.onloadedmetadata = () => {
            URL.revokeObjectURL(video.src);

            if (!isFinite(video.duration) || video.duration <= 0) {
                reject("Invalid duration");
            } else {
                resolve(video.duration);
            }
        };

        video.onerror = () => reject("Video load failed");
    });
}

function getFileDuration(file) {
    return new Promise((resolve, reject) => {

        const video = document.createElement("video");
        const url = URL.createObjectURL(file);

        video.preload = "metadata";
        video.src = url;

        video.onloadedmetadata = () => {
            URL.revokeObjectURL(url);

            if (!isFinite(video.duration) || video.duration <= 0) {
                reject("Invalid file duration");
            } else {
                resolve(video.duration);
            }
        };

        video.onerror = () => reject("File video load failed");
    });
}

async function generateBroadcast() {

    const title = document.getElementById("title").value.trim();
    const videoUrl = document.getElementById("videoUrl").value.trim();
    const file = document.getElementById("videoFile").files[0];

    const startLocal = document.getElementById("startTime").value;
    const endLocal = document.getElementById("endTime").value;

    const fallbackMinutes =
        parseInt(document.getElementById("durationMinutes").value) || 5;

    const output = document.getElementById("output");

    try {

        if (!startLocal) {
            throw new Error("Start time required");
        }

        const startDate = new Date(startLocal);

        if (isNaN(startDate.getTime())) {
            throw new Error("Invalid start time");
        }

        let endDate;

        if (!endLocal) {

            let durationSeconds = 0;

            try {
                if (file) {
                    durationSeconds = await getFileDuration(file);
                } else if (videoUrl) {
                    durationSeconds = await getVideoDuration(videoUrl);
                } else {
                    throw new Error("No video source provided");
                }

            } catch (e) {
                console.warn("Duration fetch failed:", e);
                durationSeconds = fallbackMinutes * 60;
            }

            endDate = new Date(startDate.getTime() + durationSeconds * 1000);

        } else {
            endDate = new Date(endLocal);
        }

        if (isNaN(endDate.getTime())) {
            throw new Error("Invalid end time computed");
        }

        const packageData = {
            active: true,
            title: title || "Untitled Broadcast",
            video: videoUrl || (file ? file.name : null),
            startTime: startDate.toISOString(),
            endTime: endDate.toISOString(),
            generatedAt: new Date().toISOString()
        };

        output.value = JSON.stringify(packageData, null, 4);

    } catch (err) {
        output.value = "ERROR: " + err.message;
    }
}

function stopBroadcast() {

    document.getElementById("output").value = JSON.stringify({
        active: false,
        generatedAt: new Date().toISOString()
    }, null, 4);
}

</script>

</body>
</html>
